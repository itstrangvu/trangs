[build]
	publish = "_site"
	command = "node fetch-notion.js && node fetch-portfolio.js && npm run build"

	[build.environment]
		# PORTFOLIO_DATABASE_ID is the Notion database id embedded in the public
		# "public Notion page" share link on the Portfolio page — it's public by
		# design and useless without NOTION_API_KEY, so it isn't a real secret.
		# Tell Netlify's secret scanner to ignore this specific key's value.
		SECRETS_SCAN_OMIT_KEYS = "PORTFOLIO_DATABASE_ID"

[[plugins]]

	# Opt-in to the Netlify Lighthouse plugin (choose one):

	# 1. Go to your site on https://app.netlify.com and navigate to the Integrations tab, search for the `Lighthouse` plugin
	# 2. Or via `npm install -D @netlify/plugin-lighthouse`

	# Read more: https://github.com/netlify/netlify-plugin-lighthouse

	package = "@netlify/plugin-lighthouse"

	# optional, fails build when a category is below a threshold
	[plugins.inputs.thresholds]
		performance = 1.0
		accessibility = 1.0
		best-practices = 1.0
		seo = 1.0

	[plugins.inputs]
		output_path = "reports/lighthouse/index.html"
